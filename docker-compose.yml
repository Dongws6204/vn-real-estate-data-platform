version: '3.8'

services:
  # 1. MongoDB Cloud 
  bronze_db:
    image: mongodb_storage
    environment:
      - MONGO_URL=


  # 2. Zookeeper (Bản Bitnami)
  zookeeper:
    image: bitnami/zookeeper:latest
    container_name: zookeeper
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    volumes:
      - ./zookeeper_data:/bitnami/zookeeper

  # 3. Kafka (Bản Bitnami - Đã set limit RAM)
  kafka:
    image: bitnami/kafka:latest
    container_name: kafka
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_HEAP_OPTS=-Xmx512m -Xms512m # Ép Kafka chỉ dùng tối đa 512MB RAM
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    volumes:
      - ./kafka_data:/bitnami/kafka

  # 4. Khởi tạo DB cho Airflow (Chạy xong tự tắt)
  airflow-init:
    image: apache/airflow:2.7.3-python3.9-slim
    container_name: airflow_init
    depends_on:
      - postgres
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:password@postgres/airflow_db
    command: db init

  # 5. Giao diện UI Airflow
  airflow-webserver:
    image: apache/airflow:2.7.3-python3.9-slim
    container_name: airflow_webserver
    depends_on:
      - airflow-init
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:password@postgres/airflow_db
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
    command: webserver

  # 6. Scheduler Airflow
  airflow-scheduler:
    image: apache/airflow:2.7.3-python3.9-slim
    container_name: airflow_scheduler
    depends_on:
      - airflow-init
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://admin:password@postgres/airflow_db
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
    command: scheduler















    